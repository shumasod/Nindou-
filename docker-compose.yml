# ローカル開発 / ステージング用 Docker Compose
# 使い方: docker compose up --build
name: nindou

services:
  # ===== Redis =====
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ===== Express API サーバー =====
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGIN: http://localhost
      DB_DIR: /data/db
    volumes:
      - sqlite_data:/data/db
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ===== Next.js フロントエンド =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      SERVER_URL: http://server:3001
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ===== Nginx リバースプロキシ =====
  nginx:
    build:
      context: ./infra/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-80}:80"
    depends_on:
      frontend:
        condition: service_healthy
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 15s
      timeout: 3s
      retries: 3

volumes:
  redis_data:
    driver: local
  sqlite_data:
    driver: local
