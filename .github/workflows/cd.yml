name: CD

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-northeast-1

jobs:
  build-and-push:
    name: Build & push images to ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    strategy:
      matrix:
        include:
          - service: server
            context: ./server
            dockerfile: ./server/Dockerfile
            ecr_secret: ECR_SERVER_URI
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            ecr_secret: ECR_FRONTEND_URI
          - service: nginx
            context: ./infra/nginx
            dockerfile: ./infra/nginx/Dockerfile
            ecr_secret: ECR_NGINX_URI

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets[matrix.ecr_secret] }}:latest
            ${{ secrets[matrix.ecr_secret] }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max

  deploy:
    name: Update ECS services
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment — server
        run: |
          aws ecs update-service \
            --cluster nindou \
            --service nindou-server \
            --force-new-deployment \
            --no-cli-pager

      - name: Force new deployment — frontend
        run: |
          aws ecs update-service \
            --cluster nindou \
            --service nindou-frontend \
            --force-new-deployment \
            --no-cli-pager

      - name: Force new deployment — nginx
        run: |
          aws ecs update-service \
            --cluster nindou \
            --service nindou-nginx \
            --force-new-deployment \
            --no-cli-pager

      - name: Wait for services to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster nindou \
            --services nindou-server nindou-frontend nindou-nginx \
            --no-cli-pager
