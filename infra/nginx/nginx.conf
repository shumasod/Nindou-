worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;

  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  types_hash_max_size 2048;
  server_tokens      off;

  # ----- Compression -----
  gzip on;
  gzip_comp_level 4;
  gzip_min_length 256;
  gzip_proxied    any;
  gzip_vary       on;
  gzip_types
    application/javascript application/json application/x-javascript
    text/css text/javascript text/plain text/xml
    image/svg+xml font/woff2;

  # ----- Rate limiting zones -----
  # API全般: IPごとに 60req/min
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  # セーブ書き込み: IPごとに 10req/min (書き込み抑制)
  limit_req_zone $binary_remote_addr zone=save_write:10m rate=10r/m;
  # フロントエンド: IPごとに 120req/min
  limit_req_zone $binary_remote_addr zone=frontend:20m rate=120r/m;

  limit_req_status 429;

  # ----- Upstream: frontend (Next.js) -----
  upstream frontend {
    server frontend:3000;
    keepalive 32;
  }

  # ----- Upstream: server (Express API) -----
  upstream api {
    server server:3001;
    keepalive 16;
  }

  # ----- Main server -----
  server {
    listen 80;
    server_name _;

    client_max_body_size 200k;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"                                        always;
    add_header X-Content-Type-Options    "nosniff"                                           always;
    add_header X-XSS-Protection          "1; mode=block"                                    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"                  always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"     always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;

    # ----- Backend health (internal) -----
    location = /nginx-health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # ----- API: save 書き込み (rate限定) -----
    location ~ ^/api/server/saves/\d+$ {
      limit_req zone=save_write burst=5 nodelay;
      limit_req zone=api       burst=10 nodelay;

      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Connection     "";
      proxy_set_header   Host           $host;
      proxy_set_header   X-Real-IP      $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 10s;
      proxy_send_timeout 10s;
    }

    # ----- API: その他エンドポイント -----
    location /api/server/ {
      limit_req zone=api burst=20 nodelay;

      rewrite ^/api/server/(.*)$ /$1 break;
      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Connection     "";
      proxy_set_header   Host           $host;
      proxy_set_header   X-Real-IP      $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 10s;
    }

    # ----- Next.js API routes -----
    location /api/ {
      limit_req zone=api burst=20 nodelay;

      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_read_timeout 15s;
    }

    # ----- Static assets (長期キャッシュ) -----
    location /_next/static/ {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host $host;
      expires            365d;
      add_header         Cache-Control "public, immutable";
      add_header         Vary "Accept-Encoding";
    }

    # ----- Frontend pages -----
    location / {
      limit_req zone=frontend burst=30 nodelay;

      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
      proxy_cache_bypass $http_upgrade;
    }
  }
}
